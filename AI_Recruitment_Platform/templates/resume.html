{% extends 'candidate_base.html' %}

{% block content %}
<style>
    .upload-container {
        border: 2px dashed #93c5fd;
        border-radius: 16px;
        background: #f8fafc;
        transition: all 0.3s ease-in-out;
        position: relative;
        overflow: hidden;
    }
    .upload-container:hover {
        background: #eff6ff;
        border-color: #3b82f6;
        box-shadow: 0 10px 25px rgba(59, 130, 246, 0.15);
    }
    .upload-content {
        padding: 4rem 2rem;
        pointer-events: none;
    }
    .upload-icon {
        color: #3b82f6;
        transition: transform 0.3s ease;
    }
    .upload-container:hover .upload-icon {
        transform: translateY(-5px);
    }
</style>

<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-8 col-lg-6">
        <div class="card p-4 p-md-5 text-center shadow border-0" style="border-radius: 20px;">
            <div class="mb-4">
                <h2 class="fw-bold" style="color: #1e293b; letter-spacing: -0.5px;">Upload Your Resume</h2>
                <p class="text-muted">Use PDF or DOCX format. Our AI will instantly analyze your skills and match you with jobs.</p>
            </div>
            
            <form method="POST" enctype="multipart/form-data" id="uploadForm">
                {% csrf_token %}
                <div class="upload-container mb-4 mx-auto" style="max-width: 500px;">
                    <!-- The Django form input renders a standard file input. We overlay it to make the whole box clickable -->
                    <div id="file-input-wrapper" style="opacity: 0; position: absolute; top:0; left:0; right:0; bottom:0; z-index:10; cursor:pointer;">
                        {{ form.resume_file }}
                    </div>
                    
                    <div class="upload-content z-1 position-relative">
                        <i class="fas fa-cloud-upload-alt fa-4x upload-icon mb-3"></i>
                        <h5 class="fw-bold text-primary mb-1">Click to browse or drag and drop</h5>
                        <p class="text-secondary small mb-0">Supported formats: .pdf, .docx</p>
                        
                        <div id="fileName" class="mt-3 py-2 px-4 bg-white text-primary rounded-pill shadow-sm d-none mx-auto border border-primary border-opacity-25" style="width: fit-content; pointer-events: all; z-index:20;">
                            <i class="fas fa-file-pdf me-2"></i><span id="nameText" class="fw-bold"></span>
                        </div>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary btn-lg fw-bold rounded-pill px-5 shadow-sm" style="background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%); border: none;">
                    <i class="fas fa-magic me-2"></i> Analyze Resume
                </button>
            </form>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const fileInput = document.querySelector('input[type="file"]');
        const fileNameDiv = document.getElementById('fileName');
        const nameText = document.getElementById('nameText');
        
        if(fileInput) {
            // Apply our classes so it takes full width/height opacity 0 securely over the div
            fileInput.style.position = 'absolute';
            fileInput.style.top = '0';
            fileInput.style.left = '0';
            fileInput.style.width = '100%';
            fileInput.style.height = '100%';
            fileInput.style.opacity = '0';
            fileInput.style.cursor = 'pointer';
            fileInput.style.zIndex = '10';

            fileInput.addEventListener('change', function(e) {
                if(e.target.files.length > 0) {
                    nameText.textContent = e.target.files[0].name;
                    fileNameDiv.classList.remove('d-none');
                } else {
                    fileNameDiv.classList.add('d-none');
                }
            });
        }
    });
</script>
{% endblock %}
